# fly.toml — MiStory realtime (Socket.IO) server.
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mistory-realtime'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_URL = 'file:/data/prod.db'
  PORT = '3001'

[[mounts]]
  source = 'mistory_data'
  destination = '/data'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
